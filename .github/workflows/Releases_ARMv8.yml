#========================================================================================================================
# https://github.com/ophub/amlogic-s9xxx-openwrt
# Description: Use Releases file to packaging
# Cron: min (0 - 59) / hour (0 - 23) / day of month (1 - 31) / month (1 - 12) / day of week (0 - 6)(Sunday - Saturday)
#========================================================================================================================

name: Releases_ARMv8
run-name: Releases - ${{ inputs.model || 'ARMv8_lede_lua'}}

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection'
        required: false
        default: 'false'

      model:
        required: true
        description: Device Model
        type: choice
        default: ARMv8_lede_lua
        options:
          - ARMv8_lede_lua
          - ARMv8_lede_js
          - ARMv8_imm

      runs-on:
        required: true
        description: Runs on...
        type: choice
        default: ubuntu-24.04
        options:
          - ubuntu-20.04
          - ubuntu-22.04
          - ubuntu-24.04

  schedule:
    - cron: '05 10 * * 4'

env:
  #REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/${{ inputs.model || 'ARMv8_lede_lua'}}.config
  DIY_feeds_SH: sh/lede_diy-part1.sh
  DIY_breakings_SH: sh/breakings_diy-part2.sh
  DIY_my_SH: sh/${{ inputs.model || 'ARMv8_lede_lua'}}_diy-part2.sh
  UPLOAD_FIRMWARE: false
  UPLOAD_RELEASE: true
  RECENT_LASTEST: 30
  TZ: Asia/Shanghai
  FILE_NAME: ${{ inputs.model || 'ARMv8_lede_lua'}}_FG
  PRODUCT_NAME: ${{ inputs.model || 'ARMv8_lede_lua'}}

jobs:
  build:
    runs-on: ${{ inputs.runs-on || 'ubuntu-24.04'}}
    if: github.event.repository.owner.id == github.event.sender.id || ! github.event.sender.id

    steps:

    - name: и®ҫзҪ®еӣәд»¶жәҗ
      run: |
        if [ "${{ inputs.model }}" = "ARMv8_imm" ]; then
            echo "REPO_URL=https://github.com/immortalwrt/immortalwrt" >> $GITHUB_ENV
            echo "REPO=immortalwrt" >> $GITHUB_ENV
          else
            echo "REPO_URL=https://github.com/coolsnowwolf/lede" >> $GITHUB_ENV
            echo "REPO=openwrt" >> $GITHUB_ENV
        fi

    - name: жЈҖеҮә
      uses: actions/checkout@v3

    - name: еҲқе§ӢеҢ–зҺҜеўғ
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # docker rmi -f $(docker images -q) 2>/dev/null || true
        sudo swapoff -a
        sudo rm -f /swapfile /mnt/swapfile
        sudo docker image prune -a -f
        sudo systemctl stop docker
        sudo snap set system refresh.retain=2
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
        sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
        sudo -E apt-get -qq purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
        sudo -E apt-get -qq update
        if [ "${{ inputs.runs-on }}" = "ubuntu-20.04" ]; then
            sudo -E apt-get -qq install $(cat $GITHUB_WORKSPACE/res/depends-ubuntu-2004)
            if [ "${{ inputs.runs-on }}" = "ubuntu-22.04" ]; then
               sudo -E apt-get -qq install $(cat $GITHUB_WORKSPACE/res/depends-ubuntu-2204)
            fi
          else
            sudo -E apt-get -qq install $(curl -fsSL https://tinyurl.com/ubuntu2404-make-openwrt) || sudo -E apt-get -qq install $(cat $GITHUB_WORKSPACE/res/ubuntu2404-make-openwrt) 
        fi
        sudo -E apt-get -qq install libfuse-dev lib32z1-dev libpcre3 libpcre3-dev clang llvm lld dos2unix
        sudo -E apt-get -qq autoremove --purge
        sudo -E systemctl daemon-reload
        sudo -E apt-get -qq clean && sudo -E apt-get -qq autoclean
        sudo timedatectl set-timezone "$TZ"
        # sudo mkdir -p /builder
        # sudo chown $USER:$GROUPS /builder
        echo "status=success" >> ${GITHUB_OUTPUT}
        df -Th
 
#    - name: еҲӣе»әиҷҡжӢҹеҶ…еӯҳ
#      run: |
#        sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=8192
#        sudo chmod 600 /mnt/swapfile
#        sudo mkswap /mnt/swapfile
#        sudo swapon /mnt/swapfile
#        free -h | grep -i swap

    - name: еҲӣе»әжЁЎжӢҹзү©зҗҶзЈҒзӣҳ
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs /dev/github/runner
        sudo mkdir -p /builder
        sudo mount /dev/github/runner /builder
        sudo chown -R runner.runner /builder
        df -Th
 
    - name: е…ӢйҡҶжәҗд»Јз Ғе…ӢйҡҶжәҗд»Јз Ғ
      working-directory: /builder
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /builder/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        useVersionInfo=$(git show -s --date=short --format="жҸҗдәӨдәә: %an<br/>жҸҗдәӨж—¶й—ҙ: %cd<br/>жҸҗдәӨеҶ…е®№: %s<br/>commit hash: %H")
        echo "useVersionInfo=$useVersionInfo" >> $GITHUB_ENV
        echo "DATE=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "DATE1=$(date "+%Y-%m-%d")" >> $GITHUB_ENV
        echo "DATE2=$(date "+%Y%m%d%H%M")" >> $GITHUB_ENV
  
    #- name: зј“еӯҳе·Ҙе…·й“ҫ
    # #uses: klever1988/cachewrtbuild@main
    # uses: stupidloud/cachewrtbuild@main
    # with:
    #   mixkey: 'lede_js_armvirt'
    #   ccache: true
    #   skip: true
    #   toolchain: true
    #   clean: false
    #   prefix: ${{ github.workspace }}/openwrt

    - name: зј“еӯҳдҫқиө–йЎ№
      uses: actions/cache@v4
      with:
        path: |
          /builder/openwrt/.ccache
          /builder/openwrt/staging_dir
        key: ${{ inputs.runs-on || 'ubuntu-24.04'}}-${{ hashFiles('**/repo_flag') }}-${{ env.DATE }}
        restore-keys: |
          ${{ inputs.runs-on || 'ubuntu-24.04'}}-${{ hashFiles('**/repo_flag') }}-

    - name: еҲ·ж–°зј“еӯҳ
      run: |
        if [ -d "/builder/openwrt/staging_dir" ]; then
          find "/builder/openwrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi
        

#    - name: е°Ҷ${{ inputs.model || 'ARMv8_lede_lua'}}жү“еҢ…дёәOpenWrt
#      if: (!cancelled())
#      uses: ophub/flippy-openwrt-actions@0.1.0
#      env:
#        OPENWRT_ARMVIRT: https://github.com/fichenx/Actions-OpenWrt/releases/download/${{ inputs.model || 'ARMv8_lede_lua'}}_raw/${{ env.REPO }}-armsr-armv8-generic-rootfs.tar.gz
#        PACKAGE_SOC: s905d_s905x3
#        WHOAMI: fichenx
#        #KERNEL_REPO_URL: https://github.com/breakings/OpenWrt/tree/main/opt
#        KERNEL_VERSION_NAME: 5.4.210_5.10.136_5.15.74_6.1.20_6.6.27_6.12.32
#        #OPENWRT_VER: R23.5.1
#        KERNEL_AUTO_LATEST: true
#        GZIP_IMGS: .gz
#        GH_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: е°Ҷ${{ inputs.model || 'ARMv8_lede_lua'}}жү“еҢ…дёәOpenWrtпјҲophub зүҲжң¬пјү
      id: pack_ophub
      if: (!cancelled())
      continue-on-error: true
      uses: ophub/flippy-openwrt-actions@main
      env:
        OPENWRT_ARMVIRT: https://github.com/fichenx/Actions-OpenWrt/releases/download/${{ inputs.model || 'ARMv8_lede_lua'}}_raw/${{ env.REPO }}-armsr-armv8-generic-rootfs.tar.gz
        PACKAGE_SOC: s905d_s905x3
        WHOAMI: fichenx
        KERNEL_VERSION_NAME: 5.4.210_5.10.136_5.15.74_6.1.20_6.6.27_6.12.32
        KERNEL_AUTO_LATEST: true
        GZIP_IMGS: .gz
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
    
  #  - name: еӨҮз”Ёжү“еҢ…пјҲfichenx зүҲжң¬пјҢд»… ophub еӨұиҙҘж—¶жү§иЎҢпјү
  #    id: pack_fichenx
  #    if: (!cancelled()) && steps.pack_ophub.outcome == 'failure'
  #    uses: fichenx/flippy-openwrt-actions@main
  #    env:
  #      OPENWRT_ARMVIRT: https://github.com/fichenx/Actions-OpenWrt/releases/download/${{ inputs.model || 'ARMv8_lede_lua'}}_raw/${{ env.REPO }}-armsr-armv8-generic-rootfs.tar.gz
  #      PACKAGE_SOC: s905d_s905x3
  #      WHOAMI: fichenx
  #      KERNEL_VERSION_NAME: 5.4.210_5.10.136_5.15.74_6.1.20_6.6.27_6.12.32
  #      KERNEL_AUTO_LATEST: true
  #      GZIP_IMGS: .gz
  #      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: SSHиҝһжҺҘеҲ°Actions @ Ctrl+Cиҝӣе…ҘпјҢCtrl+DйҖҖеҮә
      uses: P3TERX/ssh2actions@main
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: дёҠдј еӣәд»¶
      uses: kittaakos/upload-artifact-as-is@master
      if: env.PACKAGED_STATUS == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        path: ${{ env.PACKAGED_OUTPUTPATH }}/

    - name: д»Һеә•еҢ…дёӯдёӢиҪҪжүҖйңҖж–Үд»¶
      run: |
        wget -O ${{ env.PACKAGED_OUTPUTPATH }}/Packages.tar.gz https://github.com/fichenx/Actions-OpenWrt/releases/download/${{ inputs.model || 'ARMv8_lede_lua'}}_raw/Packages.tar.gz
        wget -O ${{ env.PACKAGED_OUTPUTPATH }}/${{ env.REPO }}-armsr-armv8-generic.manifest https://github.com/fichenx/Actions-OpenWrt/releases/download/${{ inputs.model || 'ARMv8_lede_lua'}}_raw/${{ env.REPO }}-armsr-armv8-generic.manifest
  
    - name: еҮҶеӨҮеҸ‘еёғз®Җд»Ӣ
      run: |
        echo "${{ inputs.model || 'ARMv8_lede_lua'}} Openwrt еӣәд»¶й…ҚзҪ®пјҡ" > release_body.txt
        echo "IP:192.168.123.2" >> release_body.txt
        echo "WEBзҷ»йҷҶиҙҰжҲ·пјҡroot" >> release_body.txt
        echo "еҜҶз Ғпјҡpassword" >> release_body.txt
        echo "еӣәд»¶жәҗз Ғпјҡ${{ env.REPO_URL }}" >> release_body.txt
        echo "еӣәд»¶еҶ…ж ёпјҡhttps://github.com/breakingbadboy/OpenWrt/releases/tag/kernel_stable" >> release_body.txt
        echo "еӣәд»¶еҶ…ж ёзүҲжң¬пјҡ${{ env.KVER }}" >> release_body.txt
        echo "жәҗз ҒжңҖиҝ‘жҸҗдәӨдҝЎжҒҜ:" >> release_body.txt
        echo "${{ env.useVersionInfo }}" >> release_body.txt
        echo "жҸ’д»¶пјҡ" >> release_body.txt
        echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ${{ env.PACKAGED_OUTPUTPATH }}/*.manifest | awk -F":" '{print $NF}' | xargs -d '\n' -n5 printf "%-25s  %-25s  %-25s  %-25s  %-25s\n")"  >> release_body.txt

    - name: еҸ‘еёғеӣәд»¶
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.DATE2 }}_${{ env.FILE_NAME }}
        name: ${{ env.DATE }} OpenWrtеӣәд»¶ for ${{ env.PRODUCT_NAME }}
        files: ${{ env.PACKAGED_OUTPUTPATH }}/*
        body_path: ./release_body.txt



    - name: еҲ йҷӨж—§зҡ„е·ҘдҪңжөҒе’Ңеӣәд»¶
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        delete_workflow_pattern: Releases_ARMv8
        retain_days: 20
        keep_minimum_runs: 5

    - name: еҲ йҷӨж—§зҡ„еҸ‘еёғзүҲжң¬
      uses: codesnas/delete-older-releases@main
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        #repo:
        keep_latest: 5
        delete_tag_pattern: ${{ env.FILE_NAME }}
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    #- name: Telegram notification
    #  run: |
    #    MSG="
    #    жү“еҢ…ж—¶й—ҙпјҡ${{ env.DATE }}
    #    OpenWrt жӣҙж–°дҝЎжҒҜпјҡ${{ env.useVersionInfo }}
    #    ${{ env.PRODUCT_NAME }} жү“еҢ…е®ҢжҲҗ
    #    "
    #    curl "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_TO }}&text=${MSG}"
    - name: жЈҖжҹҘжү“еҢ…жҳҜеҗҰжҲҗеҠҹ
      if: (!cancelled())
      run: |
        if [[ "${{ steps.pack_ophub.outcome }}" == "success" || "${{ steps.pack_fichenx.outcome }}" == "success" ]]; then
          echo "жү“еҢ…жҲҗеҠҹпјҲophub/fichenx д»»дёҖзүҲжң¬жү§иЎҢжҲҗеҠҹпјү"
          exit 0
        else
          echo "жүҖжңүжү“еҢ…зүҲжң¬еқҮеӨұиҙҘ"
          exit 1
        fi

    - name: жЈҖжҹҘжү“еҢ…жҳҜеҗҰжҲҗеҠҹ
      if: (!cancelled())
      run: |
        # е®ҡд№үдёӨдёӘжӯҘйӘӨзҡ„жү§иЎҢз»“жһңпјҢжңӘжү§иЎҢеҲҷй»ҳи®Өз©ә
        PACK_OPHUB_OUTCOME="${{ steps.pack_ophub.outcome }}"
        PACK_FICHENX_OUTCOME="${{ steps.pack_fichenx.outcome }}"
        
        # жү“еҚ°и°ғиҜ•дҝЎжҒҜпјҲеҸҜйҖүпјҢж–№дҫҝжҺ’жҹҘпјү
        echo "ophub зүҲжң¬жү§иЎҢз»“жһң: $PACK_OPHUB_OUTCOME"
        echo "fichenx зүҲжң¬жү§иЎҢз»“жһң: $PACK_FICHENX_OUTCOME"

        # еҲӨж–ӯйҖ»иҫ‘пјҡд»»дёҖзүҲжң¬жҲҗеҠҹеҚіи§Ҷдёәж•ҙдҪ“жҲҗеҠҹ
        if [[ "$PACK_OPHUB_OUTCOME" == "success" || "$PACK_FICHENX_OUTCOME" == "success" ]]; then
          echo "вң… жү“еҢ…жҲҗеҠҹпјҲophub/fichenx д»»дёҖзүҲжң¬жү§иЎҢжҲҗеҠҹпјү"
          exit 0
        else
          echo "вқҢ жүҖжңүжү“еҢ…зүҲжң¬еқҮеӨұиҙҘ"
          exit 1
        fi